name = "composer"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Node built-ins (Buffer, streams) used by pdf-lib / fontkit.
compatibility_flags = ["nodejs_compat"]

# Non-secret configuration. Secrets (tokens, API keys, the model id) are NOT
# stored here — they live in .env and are uploaded with `npm run secrets`.
[vars]
BOT_NAME = "Composer"
AGENT_MAX_STEPS = "6"
HISTORY_LIMIT = "16"
# Fonts embedded into generated PDFs. DejaVu has full Latin + Cyrillic coverage
# in one file (the previous Noto subset was Cyrillic-only, so Latin like
# "git commit" rendered as boxes). Mono is used for code blocks.
PDF_FONT_URL = "https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSans.ttf"
PDF_FONT_BOLD_URL = "https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSans-Bold.ttf"
PDF_FONT_MONO_URL = "https://cdn.jsdelivr.net/npm/dejavu-fonts-ttf@2.37.3/ttf/DejaVuSansMono.ttf"
# Media downloads use our own yt-dlp system (Node runtime only) — no service
# URL or API key to configure here.

# Per-chat actor: holds each user's memory file and schedules reminder alarms.
# No manual setup needed — the migration below provisions it on deploy. Uses the
# SQLite-backed Durable Object storage, which is available on the Workers free
# plan.
[[durable_objects.bindings]]
name = "CHAT_AGENT"
class_name = "ChatAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatAgent"]

# Optional: a KV namespace is NOT required for the default Durable Object path —
# durable state lives in the Durable Object above.
#
# ---------------------------------------------------------------------------
# OPT-IN: "Workers + KV + Queue" ReAct runtime (issue #3)
# ---------------------------------------------------------------------------
# Runs ONE ReAct cycle per Worker request: the webhook enqueues a job and the
# queue consumer advances the run a step at a time, with state stored in KV.
# Requires the Workers PAID plan (Queues). Reminders are unavailable in this
# mode (they rely on Durable Object alarms) — leave it off to keep reminders.
#
# To enable, create the resources and uncomment both blocks below:
#   npx wrangler kv namespace create COMPOSER_KV   # paste the id here
#   npx wrangler queues create composer-agent
# Queue mode activates automatically once BOTH bindings are present.
#
# [[kv_namespaces]]
# binding = "COMPOSER_KV"
# id = "<your-kv-namespace-id>"
#
# [[queues.producers]]
# binding = "AGENT_QUEUE"
# queue = "composer-agent"
#
# [[queues.consumers]]
# queue = "composer-agent"
# max_batch_size = 1
# max_retries = 1

[observability]
enabled = true
